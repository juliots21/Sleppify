<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html {
            /* background-color: #8f8282; */
            background: url('static/assets/bg_3.jpg');
            /* Full height */
            height: 100%;

            /* Center and scale the image nicely */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;


        }






        .container-fluid {
            margin-top: 50px;
            background-color: transparent;
        }

        .card {
            padding: 20px;

        }
    </style>
</head>

<body class="bg-transparent">
    <div class="background-container"></div>
    <header>
        <div class="row">
            <p class="bg-primary text-center">Mp3 Downloader</p>
        </div>
    </header>
    <div class="container ">
        <div class="row justify-content-center ">
            <div class="col-lg-6 col-md-8">
                <div class="card">
                    <h3 class="text-center mb-4">YouTube Video to Mp3</h3>

                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    <div class="mt-3">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}
                    {% endwith %}

                    <form id="single-link-form" action="/" method="POST">
                        <div class="mb-3">
                            <label for="videoLink" class="form-label">Enter YouTube Video Link</label>
                            <input type="url" name="videoLink" class="form-control" id="videoLink"
                                placeholder="https://www.youtube.com/watch?v=example" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Download Mp3</button>
                    </form>

                    <hr>
                    <form id="bulk-link-form" enctype="multipart/form-data" action="/bulkurl" method="POST">
                        <div class="mb-3">
                            <label for="excelFile" class="form-label">Upload Excel File (Bulk Links)</label>
                            <input type="file" name="excelFile" class="form-control" id="excelFile" accept=".xlsx, .xls"
                                required>

                        </div>
                        <button type="submit" class="btn btn-success w-100">Download Mp3</button>
                    </form>

                    <!-- Circular progress indicator -->
                    <!--                    <div id="progress">-->
                    <!--                        <div class="loader"></div>-->
                    <!--                    </div>-->

                    <!-- Show the file path and open button if a file has been processed -->
                    {% if file_path %}
                    <div class="mt-4 text-center">
                        <p>File downloaded to: <strong>{{ file_path }}</strong></p>
                        <a href="/open/{{ file_path }}" class="btn btn-outline-success">Open File</a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <!-- <script>-->
    <!--        function showProgress() {-->
    <!--            document.getElementById("progress").style.display = "block"; // Show progress indicator-->
    <!--        }-->
    <!--    </script>-->

    <!--    <script src="{{ url_for('static', filename='script.js') }}">-->

    <!--    </script>-->
</body>

</html>
